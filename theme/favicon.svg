<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="9" fill="#23262d"/>
  <!-- notebook rule lines -->
  <g stroke="#3a3f49" stroke-width="1.4">
    <line x1="14" y1="20" x2="50" y2="20"/>
    <line x1="14" y1="30" x2="50" y2="30"/>
    <line x1="14" y1="40" x2="50" y2="40"/>
    <line x1="14" y1="50" x2="50" y2="50"/>
  </g>
  <!-- margin rule -->
  <line x1="21" y1="12" x2="21" y2="52" stroke="#b0472e" stroke-width="1.6"/>
